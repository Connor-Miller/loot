# Standalone smoke test — its BODY is kept OUT of the dist-generated release.yml
# on purpose, so `dist generate` never clobbers it (#258). dist only adds a *call*
# to this file (via `post-announce-jobs` in dist-workspace.toml, #271), so the job
# body below stays hand-owned. Proves the published Linux `curl | sh` one-liner
# actually installs and resolves `loot` on a clean runner.
name: Smoke — Linux install

on:
  # Called by cargo-dist's release.yml as a post-announce job, once the GitHub
  # Release (installer + binaries at releases/latest) has been published (#271).
  # A plain `release: [published]` trigger does NOT work: release.yml publishes
  # with the built-in GITHUB_TOKEN, and GitHub's recursion guard refuses to start
  # new workflow runs from GITHUB_TOKEN-raised events — so the gate silently never
  # fired. dist passes every custom job a single required `plan` input.
  workflow_call:
    inputs:
      plan:
        description: The dist-manifest plan JSON (passed by dist; unused here).
        required: true
        type: string
  # And on demand, to re-check an existing release without cutting a new one.
  # The default installer URL is the site's hero one-liner (#260): the proxy at
  # loot.millerbyte.com must serve the real installer, not just GitHub-direct.
  workflow_dispatch:
    inputs:
      installer_url:
        description: Installer script URL to pipe to sh
        required: false
        default: https://loot.millerbyte.com/install.sh

jobs:
  linux-curl-sh:
    name: linux curl | sh installs and resolves loot
    runs-on: ubuntu-latest
    steps:
      - name: Install loot from the release installer (anonymous, public repo)
        # bash for pipefail: catch a failing curl rather than letting `sh` swallow it.
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            "${{ inputs.installer_url || 'https://github.com/Connor-Miller/loot/releases/latest/download/loot-cli-installer.sh' }}" | sh

      - name: Put the install dir on PATH for the next step
        # The installer targets ~/.loot/bin and edits the shell rc, which does not
        # affect the already-running job — surface it to later steps explicitly.
        run: echo "$HOME/.loot/bin" >> "$GITHUB_PATH"

      - name: Resolve `loot` and print its version
        run: |
          which loot
          loot --version
