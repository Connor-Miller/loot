[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "aarch64-pc-windows-msvc", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Path that installers should place binaries in. NOT CARGO_HOME (dist's default):
# that silently assumes a Rust dev (~/.cargo/bin) and is already on PATH for them,
# so it never exercises the installer's PATH-edit path — wrong for a
# general-audience product one-liner. A dedicated, namespaced dir installs the
# same everywhere and forces the real PATH handling (Windows HKCU + unix rc edit).
install-path = "~/.loot/bin"
# Where to host releases
hosting = "github"
# Whether to install an updater program
install-updater = false
# Generate GitHub Artifact Attestations (build provenance) for the release
# artifacts (#221 integrity). Adds id-token/attestations permissions + the
# attest-build-provenance step to release.yml; verifiable with
# `gh attestation verify <file> --repo Connor-Miller/loot`.
github-attestations = true
# Emit a SHA-256 digest alongside every artifact (a unified `sha256.sum` on the
# Release), so the Install page's manual-verify path has a checksum to check.
checksum = "sha256"
